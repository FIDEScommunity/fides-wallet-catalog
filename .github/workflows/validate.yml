name: Validate Wallet Catalogs

on:
  push:
    paths:
      - 'community-catalogs/**/wallet-catalog.json'
      - 'schemas/**'
      - '.github/workflows/validate.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'community-catalogs/**/wallet-catalog.json'
      - 'schemas/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate all wallet catalogs
        run: |
          echo "🔍 Validating community catalogs + fixtures (v2)..."
          npm run validate:v2
          echo "🔍 Running schema + migration unit tests..."
          npm run test:schema
          npm run test:migrate
          echo "✅ Schema validation passed!"

